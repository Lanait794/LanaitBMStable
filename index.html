<!DOCTYPE html>
<html lang="ja">

<head>
    <title>Lanait難易度表</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="bmstable" content="header.json" />
    <script src="https://code.jquery.com/jquery-2.2.4.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <header class="mb-3">
        <nav class="navbar navbar-dark bg-dark">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1">Lanait難易度表</span>
            </div>
        </nav>
    </header>

    <div class="container">

        <div class="alert alert-success mb-3" role="alert">
            <p>Lanaitの譜面とLanaitの曲で作ってもらった譜面まとめ。</p>
            <p>レベルはSatellite基準。Stella以上は13, 14表記です。</p>
            <hr>
            <p class="mb-0">
                何かあれば
                <a href="https://twitter.com/Lanait_2"
                   target="_blank"
                   rel="noopener"
                   class="text-decoration-none fw-bold text-primary">
                   @Lanait_2
                </a>
                まで。
            </p>
        </div>

        <div>
            <table class="table table-light table-striped table-hover" id="table_int"></table>
        </div>

        <script type="text/javascript">
            $(document).ready(function () {
                $.getJSON($("meta[name=bmstable]").attr("content"), function (header) {
                    $.getJSON(header.data_url, function (information) {

                        // レベル昇順 → 同レベル内タイトル順
                        information.sort(function(a, b){

                            if (a.level === "??") return 1;
                            if (b.level === "??") return -1;

                            var levelDiff = Number(a.level) - Number(b.level);
                            if (levelDiff !== 0) return levelDiff;

                            return a.title.localeCompare(b.title, 'ja');
                        });

                        makeBMSTable(information, header.symbol);
                    });
                });
            });

            function esc(s) {
                return (s == null ? "" : String(s))
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
            }

            function linkCell(val, text) {
                if (!val) return "";
                return "<a href='" + esc(val) + "' target='_blank' rel='noopener'>" + text + "</a>";
            }

            function makeBMSTable(info, mark) {
                var obj = $("#table_int");
                obj.html("");

                $("<thead class='table-dark'><tr>"
                    + "<th>Level</th>"
                    + "<th>Title</th>"
                    + "<th>作曲者</th>"
                    + "<th>BPM</th>"
                    + "<th>T/N</th>"
                    + "<th>Comment</th>"
                    + "<th>本体</th>"
                    + "<th>差分</th>"
                    + "</tr></thead><tbody>").appendTo(obj);

                for (var i = 0; i < info.length; i++) {

                    var tr = $("<tr></tr>");

                    tr.append("<td width='5%'>" + esc(mark + info[i].level) + "</td>");

                    var titleCell = info[i].md5
                        ? "<a href='http://www.dream-pro.info/~lavalse/LR2IR/search.cgi?mode=ranking&bmsmd5="
                          + esc(info[i].md5) + "' target='_blank'>" + esc(info[i].title) + "</a>"
                        : esc(info[i].title);

                    tr.append("<td width='24%'>" + titleCell + "</td>");

                    tr.append("<td width='10%'>" + esc(info[i]['作曲者']) + "</td>");
                    tr.append("<td width='7%'>" + esc(info[i]['BPM']) + "</td>");
                    tr.append("<td width='6%'>" + esc(info[i]['T/N']) + "</td>");

                    var commentText = esc(info[i].comment);
                    commentText = commentText.replace(/sl\d+/g,
                        "<span style='color:red;'>$&</span>");

                    tr.append("<td width='24%'>" + commentText + "</td>");

                    tr.append("<td width='6%'>" + linkCell(info[i]['本体'], "本体") + "</td>");
                    tr.append("<td width='6%'>" + linkCell(info[i]['差分'], "差分") + "</td>");

                    tr.appendTo(obj);
                }
            }
        </script>
    </div>
</body>
</html>
